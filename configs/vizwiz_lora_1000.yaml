### model
model_name_or_path: zai-org/GLM-OCR
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 8
lora_target: all

### dataset
dataset: vizwiz
template: glm_ocr
cutoff_len: 1024
max_samples: 1000
preprocessing_num_workers: 2

### output
output_dir: saves/glm-ocr/vizwiz-lora
logging_steps: 5
save_steps: 50
plot_loss: true
overwrite_output_dir: true
report_to: none

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 4
learning_rate: 1e-4
num_train_epochs: 2
lr_scheduler_type: cosine
warmup_ratio: 0.1

### precision
bf16: false
fp16: false
